<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <defs>
    <!-- Upper tooth gradient -->
    <linearGradient id="utg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="15%" stop-color="#FAFAFA"/>
      <stop offset="70%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <!-- Lower tooth gradient -->
    <linearGradient id="ltg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2E2E2"/>
      <stop offset="30%" stop-color="#EEEEEE"/>
      <stop offset="100%" stop-color="#F8F8F8"/>
    </linearGradient>
    <!-- Gloss -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Dark mouth background -->
  <rect x="0" y="0" width="200" height="100" rx="10" fill="#1a0a0a"/>

  <!-- UPPER TEETH (8 teeth) -->
  <g filter="url(#shadow)">
    <!-- Tooth 1 (left lateral) -->
    <rect x="8" y="4" width="20" height="38" rx="3" ry="5" fill="url(#utg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="9" y="4" width="18" height="10" rx="2" fill="url(#gloss)"/>
    
    <!-- Tooth 2 -->
    <rect x="30" y="2" width="20" height="42" rx="3" ry="5" fill="url(#utg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="31" y="2" width="18" height="11" rx="2" fill="url(#gloss)"/>
    
    <!-- Tooth 3 (left central) -->
    <rect x="52" y="1" width="22" height="45" rx="3" ry="6" fill="url(#utg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="53" y="1" width="20" height="12" rx="2" fill="url(#gloss)"/>
    
    <!-- Tooth 4 (left central incisor) -->
    <rect x="76" y="0" width="23" height="47" rx="3" ry="6" fill="url(#utg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="77" y="0" width="21" height="13" rx="2" fill="url(#gloss)"/>
    
    <!-- Tooth 5 (right central incisor) -->
    <rect x="101" y="0" width="23" height="47" rx="3" ry="6" fill="url(#utg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="102" y="0" width="21" height="13" rx="2" fill="url(#gloss)"/>
    
    <!-- Tooth 6 (right central) -->
    <rect x="126" y="1" width="22" height="45" rx="3" ry="6" fill="url(#utg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="127" y="1" width="20" height="12" rx="2" fill="url(#gloss)"/>
    
    <!-- Tooth 7 -->
    <rect x="150" y="2" width="20" height="42" rx="3" ry="5" fill="url(#utg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="151" y="2" width="18" height="11" rx="2" fill="url(#gloss)"/>
    
    <!-- Tooth 8 (right lateral) -->
    <rect x="172" y="4" width="20" height="38" rx="3" ry="5" fill="url(#utg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="173" y="4" width="18" height="10" rx="2" fill="url(#gloss)"/>
  </g>

  <!-- Gap between upper and lower teeth -->
  <rect x="5" y="48" width="190" height="3" fill="#0d0505" opacity="0.6"/>

  <!-- LOWER TEETH (6 teeth, smaller) -->
  <g filter="url(#shadow)">
    <rect x="25" y="53" width="22" height="32" rx="3" ry="4" fill="url(#ltg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="49" y="52" width="22" height="35" rx="3" ry="4" fill="url(#ltg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="73" y="51" width="24" height="37" rx="3" ry="5" fill="url(#ltg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="99" y="51" width="24" height="37" rx="3" ry="5" fill="url(#ltg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="125" y="52" width="22" height="35" rx="3" ry="4" fill="url(#ltg)" stroke="#D8D8D8" stroke-width="0.5"/>
    <rect x="149" y="53" width="22" height="32" rx="3" ry="4" fill="url(#ltg)" stroke="#D8D8D8" stroke-width="0.5"/>
  </g>
</svg>
